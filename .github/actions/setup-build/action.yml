name: 'Setup Build Environment'
description: 'Sets up Go, Node.js, templ, and generates assets'
inputs:
    go-version:
    description: 'Go version'
    default: '1.25'
  node-version:
    description: 'Node.js version'
    default: '22'
  skip-css:
    description: 'Skip CSS generation'
    default: 'false'
  enable-cache:
    description: 'Enable GitHub Actions cache (disable for self-hosted runners with persistent storage)'
    default: 'true'
  enable-templ-cache:
    description: 'Enable templ file caching (recommended for GitHub-hosted runners)'
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache: ${{ inputs.enable-cache }}

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.enable-cache == 'true' && 'npm' || '' }}

    - name: Install templ
      shell: bash
      run: go install github.com/a-h/templ/cmd/templ@latest

    - name: Install npm dependencies
      shell: bash
      run: npm ci

    - name: Get templ hash
      if: inputs.enable-templ-cache == 'true'
      id: templ-hash
      shell: bash
      run: echo "hash=${{ hashFiles('**/*.templ') }}" >> $GITHUB_OUTPUT

    - name: Cache templ generated files
      if: inputs.enable-templ-cache == 'true'
      id: templ-cache
      uses: actions/cache@v4
      with:
        path: |
          views/*_templ.go
          views/**/*_templ.go
        key: templ-${{ steps.templ-hash.outputs.hash }}

    - name: Generate templ files
      if: steps.templ-cache.outputs.cache-hit != 'true'
      shell: bash
      run: templ generate

    - name: Build CSS
      if: inputs.skip-css != 'true'
      shell: bash
      run: npx @tailwindcss/cli -i input.css -o assets/styles.css --minify
