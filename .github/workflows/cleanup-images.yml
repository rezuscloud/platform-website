name: Cleanup Container Images

on:
  pull_request:
    types: [closed]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      prune_untagged:
        description: Delete untagged versions
        type: boolean
        default: true
      prune_legacy:
        description: Delete non-semver tagged versions older than 7 days
        type: boolean
        default: true
      keep_last_n:
        description: Number of semver releases to keep
        type: number
        default: 5

permissions:
  packages: write

jobs:
  cleanup-pr:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Delete PR images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          TAG_PREFIX="pr-${PR_NUMBER}-"
          echo "Looking for images with tag prefix: ${TAG_PREFIX}"

          VERSIONS=$(gh api "/orgs/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/versions?per_page=100" --paginate 2>/dev/null || echo '[]')

          MATCHING=$(echo "$VERSIONS" | jq -c "[.[]? | select(.metadata.container.tags[]? // \"\" | startswith(\"${TAG_PREFIX}\"))]")
          TOTAL=$(echo "$MATCHING" | jq 'length')

          echo "Found ${TOTAL} matching versions"

          DELETED=0
          FAILED=0

          for VID in $(echo "$MATCHING" | jq -r '.[].id'); do
            if gh api -X DELETE "/orgs/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/versions/${VID}" 2>/dev/null; then
              echo "  Deleted version ${VID}"
              DELETED=$((DELETED + 1))
            else
              echo "  Failed to delete version ${VID}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "Cleanup complete: ${DELETED} deleted, ${FAILED} failed out of ${TOTAL}"

  cleanup-untagged:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Delete untagged orphaned versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Deleting untagged orphaned versions..."

          VERSIONS=$(gh api "/orgs/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/versions?per_page=100" --paginate 2>/dev/null || echo '[]')

          # Build the set of digests referenced by any tagged multi-arch index.
          # Multi-arch (buildx) pushes upload per-architecture manifests and
          # attestation manifests as UNTAGGED versions, referenced by digest
          # from the tagged index. Deleting them turns the index into a dead
          # pointer and breaks image pulls with "manifest unknown".
          REFERENCED_FILE=$(mktemp)
          trap 'rm -f "$REFERENCED_FILE"' EXIT

          REGISTRY_TOKEN=$(curl -sS \
            -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/token?scope=repository:${{ github.repository }}:pull&service=ghcr.io" \
            | jq -r .token)

          for TAG in $(echo "$VERSIONS" | jq -r '.[]? | select((.metadata.container.tags // []) | length > 0) | .metadata.container.tags[]'); do
            curl -sS \
              -H "Authorization: Bearer $REGISTRY_TOKEN" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${{ github.repository }}/manifests/$TAG" \
              | jq -r 'if has("manifests") then .manifests[].digest else empty end' \
              >> "$REFERENCED_FILE"
          done

          sort -u "$REFERENCED_FILE" -o "$REFERENCED_FILE"
          REFERENCED_COUNT=$(wc -l < "$REFERENCED_FILE")
          echo "Found ${REFERENCED_COUNT} digests referenced by tagged images"

          UNTAGGED=$(echo "$VERSIONS" | jq -c "[.[]? | select((.metadata.container.tags // []) | length == 0)]")
          TOTAL=$(echo "$UNTAGGED" | jq 'length')

          echo "Found ${TOTAL} untagged versions"

          DELETED=0
          SKIPPED=0
          FAILED=0

          for VID_NAME in $(echo "$UNTAGGED" | jq -r '.[] | "\(.id)|\(.name)"'); do
            VID=$(echo "$VID_NAME" | cut -d'|' -f1)
            VNAME=$(echo "$VID_NAME" | cut -d'|' -f2)

            if [ -n "$VNAME" ] && grep -qx "$VNAME" "$REFERENCED_FILE" 2>/dev/null; then
              echo "  Keeping version ${VID} (${VNAME}) — referenced by tagged index"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            if gh api -X DELETE "/orgs/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/versions/${VID}" 2>/dev/null; then
              echo "  Deleted orphaned version ${VID} (${VNAME})"
              DELETED=$((DELETED + 1))
            else
              echo "  Failed to delete untagged version ${VID}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "Untagged cleanup: ${DELETED} deleted, ${SKIPPED} kept (referenced), ${FAILED} failed out of ${TOTAL}"

  cleanup-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Delete untagged and old versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRUNE_UNTAGGED: ${{ inputs.prune_untagged }}
          PRUNE_LEGACY: ${{ inputs.prune_legacy }}
          KEEP_LAST_N: ${{ inputs.keep_last_n }}
        run: |
          set -euo pipefail

          VERSIONS=$(gh api "/orgs/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/versions?per_page=100" --paginate 2>/dev/null || echo '[]')

          TO_DELETE="[]"

          REFERENCED_FILE=$(mktemp)
          trap 'rm -f "$REFERENCED_FILE"' EXIT

          REGISTRY_TOKEN=$(curl -sS \
            -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/token?scope=repository:${{ github.repository }}:pull&service=ghcr.io" \
            | jq -r .token)

          for TAG in $(echo "$VERSIONS" | jq -r '.[]? | select((.metadata.container.tags // []) | length > 0) | .metadata.container.tags[]'); do
            curl -sS \
              -H "Authorization: Bearer $REGISTRY_TOKEN" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${{ github.repository }}/manifests/$TAG" \
              | jq -r 'if has("manifests") then .manifests[].digest else empty end' \
              >> "$REFERENCED_FILE"
          done
          sort -u "$REFERENCED_FILE" -o "$REFERENCED_FILE"

          if [ "$PRUNE_UNTAGGED" = "true" ]; then
            echo "Collecting untagged orphaned versions (excluding those referenced by tagged indexes)..."
            REFERENCED_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' "$REFERENCED_FILE")
            UNTAGGED=$(echo "$VERSIONS" | jq --argjson ref "$REFERENCED_JSON" '
              [.[]? |
                select((.metadata.container.tags // []) | length == 0) |
                select(.name as $n | $ref | index($n) | not)
              ]
            ')
            TO_DELETE=$(echo "$TO_DELETE" | jq --argjson add "$UNTAGGED" '. + $add')
          fi

          if [ "$PRUNE_LEGACY" = "true" ]; then
            echo "Collecting non-semver versions older than 7 days..."
            CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)
            LEGACY=$(echo "$VERSIONS" | jq -c --arg cutoff "$CUTOFF" '
              [.[]? | select(
                (.metadata.container.tags // []) | length > 0
                and (.metadata.container.tags | all(. as $t | (startswith("v") and ($t | test("^v[0-9]+\\.[0-9]+\\.[0-9]+"))) | not))
                and .created_at < $cutoff
              )]
            ')
            TO_DELETE=$(echo "$TO_DELETE" | jq --argjson add "$LEGACY" '. + $add')
          fi

          TO_DELETE=$(echo "$TO_DELETE" | jq 'unique_by(.id)')
          TOTAL=$(echo "$TO_DELETE" | jq 'length')

          echo "Total versions to delete: ${TOTAL}"

          DELETED=0
          FAILED=0

          for VID in $(echo "$TO_DELETE" | jq -r '.[].id'); do
            if gh api -X DELETE "/orgs/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/versions/${VID}" 2>/dev/null; then
              DELETED=$((DELETED + 1))
            else
              echo "  Failed to delete version ${VID}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "Manual cleanup: ${DELETED} deleted, ${FAILED} failed out of ${TOTAL}"
