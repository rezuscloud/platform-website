name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for manual dispatch)'
        required: false
        type: number

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          enable-cache: ${{ runner.environment != 'self-hosted' }}
          enable-templ-cache: ${{ runner.environment != 'self-hosted' }}

      - name: Format check (templ)
        run: templ fmt -fail .

      - name: Format check (Go)
        run: test -z "$(gofmt -l .)"

      - name: Run shell unit tests (fetch-docs version selection)
        run: bash scripts/fetch-docs.test.sh

      - name: Vet
        run: go vet ./...

      - name: Setup .NET
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 9.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          configFilePath: .github/GitVersion.yml

      - name: Fetch external docs
        run: bash scripts/fetch-docs.sh

      - name: Build binary
        run: >
          CGO_ENABLED=0 go build
          -ldflags="-s -w -X github.com/rezuscloud/platform-website/version.Version=${{ steps.gitversion.outputs.semVer }} -X github.com/rezuscloud/platform-website/version.GitCommit=${{ steps.gitversion.outputs.shortSha }} -X github.com/rezuscloud/platform-website/version.BuildTime=${{ steps.gitversion.outputs.commitDate }}"
          -trimpath
          -o bin/server
          .

  test:
    needs: build
    strategy:
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            arch: x64
          - runner: [self-hosted, Linux, ARM64]
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          enable-cache: ${{ runner.environment != 'self-hosted' }}
          enable-templ-cache: ${{ runner.environment != 'self-hosted' }}

      - name: Install C compiler (required for -race)
        run: which gcc || (sudo apt-get update -q && sudo apt-get install -y gcc)

      - name: Run unit tests (Layer 1 - httptest)
        env:
          CGO_ENABLED: "1"
        run: go test -v -race -parallel 4 ./handlers/...

      - name: Run integration tests (Layer 2 - goquery)
        env:
          CGO_ENABLED: "1"
        run: go test -v -race -parallel 2 ./tests/... -run "Integration|HTML|Section|Navigation|Footer|Accessibility|HTMX|Responsive|DarkMode|Alpine|Progressive"

  e2e-test:
    needs: build
    strategy:
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            arch: x64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          enable-cache: ${{ runner.environment != 'self-hosted' }}
          enable-templ-cache: ${{ runner.environment != 'self-hosted' }}

      - name: Install C compiler (required for -race)
        run: which gcc || (sudo apt-get update -q && sudo apt-get install -y gcc)

      - name: Install Chrome/Chromium
        run: |
          if command -v google-chrome &>/dev/null || command -v chromium &>/dev/null || command -v chromium-browser &>/dev/null; then
            echo "Chrome/Chromium already installed"
            exit 0
          fi
          if command -v pacman &>/dev/null; then
            sudo pacman -S --noconfirm chromium
          elif command -v apt-get &>/dev/null; then
            sudo apt-get update -q
            sudo apt-get install -y wget
            wget -q -O /tmp/google-chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt-get install -y /tmp/google-chrome.deb || sudo apt-get install -f -y
          elif command -v dnf &>/dev/null; then
            sudo dnf install -y chromium
          elif command -v yum &>/dev/null; then
            sudo yum install -y chromium
          elif command -v zypper &>/dev/null; then
            sudo zypper install -y chromium
          else
            echo "Warning: Unsupported package manager. Chrome must be pre-installed."
          fi

      - name: Free port 3000
        run: sudo fuser -k 3000/tcp 2>/dev/null || true

      - name: Build container
        run: |
          docker rm -f platform-website 2>/dev/null || true
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          docker build --network=host --build-arg TARGETARCH=${ARCH} --build-arg NODE_AUTH_TOKEN=${{ github.token }} -t platform-website-test .

      - name: Run container
        run: |
          docker run -d --name platform-website -p 3000:3000 platform-website-test
          sleep 3
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000

      - name: Run E2E tests (Layer 3 - chromedp)
        env:
          CGO_ENABLED: "1"
        run: go test -v -race -count=1 -tags=e2e ./tests/... -run "E2E" -timeout 5m

      - name: Stop container
        if: always()
        run: docker stop platform-website && docker rm platform-website || true

  docker-pr:
    needs: [build, test, e2e-test]
    if: always() && needs.build.result == 'success' && needs.test.result == 'success' && needs.e2e-test.result == 'success'
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - name: Fetch external docs
        run: bash scripts/fetch-docs.sh
      - name: Resolve PR context
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.pr_number }}" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
            if [ -z "$PR_NUMBER" ]; then
              echo "No open PR for branch ${{ github.ref_name }}, skipping docker-pr"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/docker-multiarch
        if: steps.pr.outputs.skip != 'true'
        with:
          push_image: true
          tag_list: |
            pr-${{ steps.pr.outputs.number }}-${{ steps.pr.outputs.sha }}
          version: pr-${{ steps.pr.outputs.number }}
          git_commit: ${{ steps.pr.outputs.sha }}
          build_time: ""
