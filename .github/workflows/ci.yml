name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: [self-hosted, Linux, ARM64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Install npm dependencies
        run: npm install

      - name: Generate templ
        run: templ generate

      - name: Format check (templ)
        run: templ fmt -fail .

      - name: Format check (Go)
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build CSS
        run: npx @tailwindcss/cli -i input.css -o assets/styles.css --minify

      - name: Build binary
        run: CGO_ENABLED=0 go build -o bin/server .

  unit-tests:
    needs: build
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ
        run: templ generate

      - name: Build CSS
        run: |
          npm install
          npx @tailwindcss/cli -i input.css -o assets/styles.css --minify

      - name: Run unit tests (Layer 1 - httptest)
        run: go test -v -count=1 ./handlers/...

  integration-tests:
    needs: build
    runs-on: [self-hosted, Linux, ARM64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ
        run: templ generate

      - name: Build CSS
        run: |
          npm install
          npx @tailwindcss/cli -i input.css -o assets/styles.css --minify

      - name: Run integration tests (Layer 2 - goquery)
        run: go test -v -count=1 ./tests/... -run "Integration|HTML|Section|Navigation|Footer|Accessibility|HTMX|Responsive|DarkMode|Alpine|Progressive"

  e2e-tests:
    needs: build
    runs-on: [self-hosted, Linux, ARM64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Install Chromium (ARM64 compatible)
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - name: Generate templ
        run: templ generate

      - name: Build CSS
        run: |
          npm install
          npx @tailwindcss/cli -i input.css -o assets/styles.css --minify

      - name: Build container
        run: docker build -t platform-website-test .

      - name: Run container
        run: |
          docker run -d --name platform-website -p 3000:3000 platform-website-test
          sleep 5
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000

      - name: Run E2E tests (Layer 3 - chromedp)
        run: go test -v -count=1 -tags=e2e ./tests/... -run "E2E" -timeout 5m

      - name: Stop container
        if: always()
        run: docker stop platform-website && docker rm platform-website

  docker-version:
    needs: [build, unit-tests, integration-tests, e2e-tests]
    runs-on: [self-hosted, Linux]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      semver: ${{ steps.gitversion.outputs.SemVer }}
      tags: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 8.0 --install-dir ~/.dotnet
          echo "$HOME/.dotnet" >> $GITHUB_PATH

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: "6.0.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.0
        with:
          overrideConfig: |
            mode: Mainline

      - name: Display GitVersion outputs
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.SemVer }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.FullSemVer }}"
          echo "Major: ${{ steps.gitversion.outputs.Major }}"
          echo "Minor: ${{ steps.gitversion.outputs.Minor }}"
          echo "Patch: ${{ steps.gitversion.outputs.Patch }}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.gitversion.outputs.SemVer }}
            type=raw,value=latest

  docker-amd64:
    needs: docker-version
    runs-on: [self-hosted, Linux, X64]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Build and push (AMD64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.docker-version.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ needs.docker-version.outputs.semver }}
          no-cache: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          outputs: type=docker,dest=/tmp/
          build-args: |
            VERSION=${{ needs.docker-version.outputs.semver }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  docker-arm64:
    needs: docker-version
    runs-on: [self-hosted, Linux, ARM64]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Build and push (ARM64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.docker-version.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ needs.docker-version.outputs.semver }}
          no-cache: true
          platforms: linux/arm64
          provenance: false
          sbom: false
          outputs: type=docker,dest=/tmp/
          build-args: |
            VERSION=${{ needs.docker-version.outputs.semver }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  docker-manifest:
    needs: [docker-version, docker-amd64, docker-arm64]
    runs-on: [self-hosted, Linux]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Create and push manifest
        run: |
          TAGS='${{ needs.docker-version.outputs.tags }}'
          for tag in $(echo "$TAGS" | tr ',' '\n'); do
            echo "Creating manifest for $tag"
            docker buildx imagetools create -t "$tag" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.docker-amd64.outputs.digest }}" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.docker-arm64.outputs.digest }}"
          done

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/platform-website" \
            -d '{"visibility":"public"}' \
          || curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/platform-website" \
            -d '{"visibility":"public"}' \
          || echo "Warning: Could not set package visibility to public. Please set it manually in GitHub Package Settings."

  docker-pr-version:
    needs: [build, unit-tests, integration-tests, e2e-tests]
    runs-on: [self-hosted, Linux]
    if: github.event_name == 'pull_request'
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}

  docker-pr-amd64:
    needs: docker-pr-version
    runs-on: [self-hosted, Linux, X64]
    if: github.event_name == 'pull_request'
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Build and push (AMD64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.docker-pr-version.outputs.tags }}
          labels: |
            org.opencontainers.image.version=pr-${{ github.event.pull_request.number }}
          no-cache: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          outputs: type=docker,dest=/tmp/
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}
            GIT_COMMIT=${{ github.event.pull_request.head.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  docker-pr-arm64:
    needs: docker-pr-version
    runs-on: [self-hosted, Linux, ARM64]
    if: github.event_name == 'pull_request'
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Build and push (ARM64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.docker-pr-version.outputs.tags }}
          labels: |
            org.opencontainers.image.version=pr-${{ github.event.pull_request.number }}
          no-cache: true
          platforms: linux/arm64
          provenance: false
          sbom: false
          outputs: type=docker,dest=/tmp/
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}
            GIT_COMMIT=${{ github.event.pull_request.head.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  docker-pr-manifest:
    needs: [docker-pr-version, docker-pr-amd64, docker-pr-arm64]
    runs-on: [self-hosted, Linux]
    if: github.event_name == 'pull_request'
    permissions:
      packages: write
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Create and push manifest
        run: |
          TAGS='${{ needs.docker-pr-version.outputs.tags }}'
          for tag in $(echo "$TAGS" | tr ',' '\n'); do
            echo "Creating manifest for $tag"
            docker buildx imagetools create -t "$tag" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.docker-pr-amd64.outputs.digest }}" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.docker-pr-arm64.outputs.digest }}"
          done

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/platform-website" \
            -d '{"visibility":"public"}' \
          || curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/platform-website" \
            -d '{"visibility":"public"}' \
          || echo "Warning: Could not set package visibility to public. Please set it manually in GitHub Package Settings."
