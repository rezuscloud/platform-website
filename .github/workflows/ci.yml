name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          enable-cache: ${{ runner.environment != 'self-hosted' }}
          enable-templ-cache: ${{ runner.environment != 'self-hosted' }}

      - name: Format check (templ)
        run: templ fmt -fail .

      - name: Format check (Go)
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build binary
        run: make build

  test:
    needs: build
    strategy:
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            arch: x64
          - runner: [self-hosted, Linux, ARM64]
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          enable-cache: ${{ runner.environment != 'self-hosted' }}
          enable-templ-cache: ${{ runner.environment != 'self-hosted' }}

      - name: Run unit tests (Layer 1 - httptest)
        run: go test -v -race -parallel 4 ./handlers/...

      - name: Run integration tests (Layer 2 - goquery)
        run: go test -v -race -parallel 2 ./tests/... -run "Integration|HTML|Section|Navigation|Footer|Accessibility|HTMX|Responsive|DarkMode|Alpine|Progressive"

  e2e-test:
    needs: build
    strategy:
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            arch: x64
          - runner: [self-hosted, Linux, ARM64]
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          enable-cache: ${{ runner.environment != 'self-hosted' }}
          enable-templ-cache: ${{ runner.environment != 'self-hosted' }}

      - name: Install Chromium
        run: |
          if command -v apt-get &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser 2>/dev/null || sudo apt-get install -y chromium
          elif command -v dnf &> /dev/null; then
            sudo dnf install -y chromium
          elif command -v yum &> /dev/null; then
            sudo yum install -y chromium
          elif command -v pacman &> /dev/null; then
            sudo pacman -S --noconfirm chromium
          elif command -v zypper &> /dev/null; then
            sudo zypper install -y chromium
          else
            echo "Warning: Unsupported package manager. Trying to proceed without installing Chromium."
            echo "Chromium must be pre-installed on this runner for E2E tests."
          fi

      - name: Build container
        run: |
          docker rm -f platform-website 2>/dev/null || true
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          docker build --build-arg TARGETARCH=${ARCH} -t platform-website-test .

      - name: Run container
        run: |
          docker run -d --name platform-website -p 3000:3000 platform-website-test
          sleep 3
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000

      - name: Run E2E tests (Layer 3 - chromedp)
        run: go test -v -race -count=1 -tags=e2e ./tests/... -run "E2E" -timeout 5m

      - name: Stop container
        if: always()
        run: docker stop platform-website && docker rm platform-website

  docker-pr:
    needs: [build, test, e2e-test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/docker-multiarch
        with:
          push_image: true
          tag_list: |
            pr-${{ github.run_number }}-${{ github.sha }}
          version: pr-${{ github.run_number }}
          git_commit: ${{ github.sha }}
          build_time: ""
