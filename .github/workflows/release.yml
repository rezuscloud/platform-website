name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      snapshot:
        description: Run in snapshot mode (no publish)
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: Determine Version
    if: github.event.inputs.snapshot != 'true'
    runs-on: [self-hosted, Linux, X64]
    outputs:
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      sha: ${{ steps.gitversion.outputs.sha }}
      shortSha: ${{ steps.gitversion.outputs.shortSha }}
      commitDate: ${{ steps.gitversion.outputs.commitDate }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 9.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          configFilePath: .github/GitVersion.yml

      - name: Display Version
        run: |
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "MajorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}"
          echo "CommitDate: ${{ steps.gitversion.outputs.commitDate }}"

      - name: Check if tag exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.gitversion.outputs.semVer }}"
          if git tag -l "$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist, will create"
          fi

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${{ steps.gitversion.outputs.semVer }}`;
            const sha = '${{ steps.gitversion.outputs.sha }}';
            console.log(`Creating tag ${tag} at ${sha}`);
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: sha
            });
            console.log(`Tag ${tag} created`);

  release:
    name: Release
    needs: version
    if: github.event.inputs.snapshot != 'true' && needs.version.outputs.semVer != ''
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: v${{ needs.version.outputs.semVer }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Install gettext-base
        run: which envsubst || (sudo apt-get update -q && sudo apt-get install -y gettext-base)

      - uses: sigstore/cosign-installer@v4.1.1

      - uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --config .github/goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snapshot:
    name: Snapshot Build
    if: github.event.inputs.snapshot == 'true'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 9.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          configFilePath: .github/GitVersion.yml

      - name: Display Version
        run: |
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install gettext-base
        run: which envsubst || (sudo apt-get update -q && sudo apt-get install -y gettext-base)

      - uses: sigstore/cosign-installer@v4.1.1

      - uses: anchore/sbom-action/download-syft@v0

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --config .github/goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.gitversion.outputs.semVer }}
