name: Preview Ready

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  clear:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview-ready label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh api --silent --method DELETE repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/preview-ready || true

  mark:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    steps:
      - name: Mark preview ready after successful docker-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          run_payload="$(gh api repos/${{ github.repository }}/actions/runs/${RUN_ID})"
          pr_number="$(jq -r '.pull_requests[0].number // empty' <<< "$run_payload")"
          head_sha="$(jq -r '.head_sha' <<< "$run_payload")"

          # For workflow_dispatch runs without PR context, resolve PR from branch name
          if [ -z "$pr_number" ] || [ -z "$head_sha" ]; then
            branch_name="$(jq -r '.head_branch' <<< "$run_payload")"
            if [ -n "$branch_name" ]; then
              pr_data="$(gh pr list --repo ${{ github.repository }} --head "$branch_name" --state open --json number --jq '.[0]')"
              pr_number="$(echo "$pr_data" | jq -r '.number')"
              head_sha="$(jq -r '.head_sha' <<< "$run_payload")"
            fi
          fi

          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "No open PR found, skipping"
            exit 0
          fi

          current_head_sha="$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')"

          if [ "$current_head_sha" != "$head_sha" ]; then
            gh api --silent --method DELETE repos/${{ github.repository }}/issues/${pr_number}/labels/preview-ready || true
            echo "HEAD SHA mismatch, cleared label"
            exit 0
          fi

          docker_pr_conclusion="$(gh api repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs --paginate --jq '.jobs[] | select(.name == "docker-pr") | .conclusion' | tail -n 1)"

          if [ "$docker_pr_conclusion" != "success" ]; then
            gh api --silent --method DELETE repos/${{ github.repository }}/issues/${pr_number}/labels/preview-ready || true
            echo "docker-pr job did not succeed ($docker_pr_conclusion), cleared label"
            exit 0
          fi

          docker buildx imagetools inspect "ghcr.io/${{ github.repository }}:pr-${pr_number}-${head_sha}"
          gh api --silent --method POST repos/${{ github.repository }}/issues/${pr_number}/labels -f labels[]=preview-ready
          echo "Added preview-ready label to PR #${pr_number}"
