version: 2

project_name: platform-website

before:
  hooks:
    - go install github.com/a-h/templ/cmd/templ@latest
    - templ generate
    - npm ci
    - npx @tailwindcss/cli -i input.css -o assets/styles.css --minify

builds:
  - env: [CGO_ENABLED=0]
    flags: [-trimpath]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/rezuscloud/platform-website/version.Version={{.Version}}
      - -X github.com/rezuscloud/platform-website/version.GitCommit={{.Commit}}
      - -X github.com/rezuscloud/platform-website/version.BuildTime={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - assets/**/*

sboms:
  - artifacts: archive

dockers_v2:
  - id: website
    dockerfile: Dockerfile.release
    images:
      - ghcr.io/rezuscloud/platform-website
    tags:
      - v{{ .Version }}
      - v{{ .Major }}
      - v{{ .Major }}.{{ .Minor }}
      - latest
    extra_files:
      - assets
    labels:
      org.opencontainers.image.title: RezusCloud Platform Website
      org.opencontainers.image.description: RezusCloud Personal Cloud website
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.url: https://rezus.cloud
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true
    flags:
      - --provenance=false

docker_digest:
  name_template: digests.txt

signs:
  - cmd: cosign
    args: ["sign-blob", "--yes", "--bundle", "${signature}", "${artifact}"]
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^ci:"]

release:
  github:
    owner: rezuscloud
    name: platform-website
