version: 2

project_name: platform-website

before:
  hooks:
    - go install github.com/a-h/templ/cmd/templ@latest
    - templ generate
    - npm install
    - npx @tailwindcss/cli -i input.css -o assets/styles.css --minify

builds:
  - env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/rezuscloud/platform-website/version.Version={{.Version}}
      - -X github.com/rezuscloud/platform-website/version.GitCommit={{.Commit}}
      - -X github.com/rezuscloud/platform-website/version.BuildTime={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - assets/**/*

dockers:
  - use: buildx
    id: amd64
    dockerfile: Dockerfile
    image_templates:
      - ghcr.io/rezuscloud/platform-website:{{ .Version }}-amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --build-arg=VERSION={{.Version}}
      - --build-arg=GIT_COMMIT={{.Commit}}
      - --build-arg=BUILD_TIME={{.Date}}
  - use: buildx
    id: arm64
    dockerfile: Dockerfile
    image_templates:
      - ghcr.io/rezuscloud/platform-website:{{ .Version }}-arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --build-arg=VERSION={{.Version}}
      - --build-arg=GIT_COMMIT={{.Commit}}
      - --build-arg=BUILD_TIME={{.Date}}

docker_manifests:
  - name_template: ghcr.io/rezuscloud/platform-website:{{ .Version }}
    image_templates:
      - ghcr.io/rezuscloud/platform-website:{{ .Version }}-amd64
      - ghcr.io/rezuscloud/platform-website:{{ .Version }}-arm64
  - name_template: ghcr.io/rezuscloud/platform-website:latest
    image_templates:
      - ghcr.io/rezuscloud/platform-website:{{ .Version }}-amd64
      - ghcr.io/rezuscloud/platform-website:{{ .Version }}-arm64

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    args: ["sign-blob", "--yes", "--output-signature", "${signature}", "${artifact}"]
    artifacts: checksum

docker_signs:
  - cmd: cosign
    args: ["sign", "--yes", "${artifact}"]
    artifacts: all

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^ci:"]

release:
  github:
    owner: rezuscloud
    name: platform-website
