<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    RezusCloud brand icon: CRT monitor with pixel cloud.
    Mac System 1 aesthetic. Bold geometric fills, no curves, no text.
  -->
  <!-- Monitor body -->
  <rect x="64" y="48" width="384" height="304" rx="6" fill="#1A1A1E"/>
  <!-- Screen -->
  <rect x="88" y="72" width="336" height="256" fill="#F7F4EF"/>
  <!-- Pixel cloud: two bumps on wide base -->
  <path d="M156 272h200v-32h-20v-32h-20v-32h-52v32h-16v-32h-52v32h-20v32h-20z" fill="#1A1A1E"/>
  <!-- Stand -->
  <rect x="224" y="352" width="64" height="40" fill="#1A1A1E"/>
  <rect x="176" y="392" width="160" height="24" rx="2" fill="#1A1A1E"/>
</svg>
