<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    RezusCloud brand icon: CRT monitor with classic cloud.
    Paper body creates contrast on dark backgrounds.
    Dark screen + paper cloud inside. Self-contained contrast.
  -->

  <!-- Monitor body — paper (visible on dark) -->
  <rect x="56" y="32" width="400" height="320" rx="12" fill="#F7F4EF"/>

  <!-- Screen — dark -->
  <rect x="80" y="56" width="352" height="264" rx="4" fill="#1A1A1E"/>

  <!-- Classic cloud — paper on dark screen -->
  <path d="
    M164 256
    C164 256 148 256 148 224
    C148 196 172 180 196 180
    C196 148 220 128 252 128
    C284 128 308 148 308 180
    C332 180 356 196 356 224
    C356 256 340 256 340 256
    Z
  " fill="#F7F4EF"/>

  <!-- Stand — paper -->
  <rect x="224" y="352" width="64" height="44" fill="#F7F4EF"/>
  <rect x="184" y="396" width="144" height="24" rx="4" fill="#F7F4EF"/>
</svg>
