<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    RezusCloud retro brand icon: pixel-art CRT monitor with cloud.
    Designed for crisp rendering at 16x16 through 512x512.
    Uses amber (Mac accent) body with dark screen showing a pixel cloud.
  -->
  <defs>
    <style>
      .monitor-body { fill: #C48A1A; }
      .monitor-bezel { fill: #A67616; }
      .screen { fill: #0D0D12; }
      .cloud { fill: #E8C84A; }
      .stand-base { fill: #8B6512; }
      .stand-neck { fill: #A67616; }
      .led { fill: #E8C84A; }
    </style>
  </defs>

  <!-- Monitor body (rounded rect with thick bezel) -->
  <rect x="48" y="40" width="416" height="304" rx="16" class="monitor-body"/>
  <!-- Inner bezel shadow -->
  <rect x="56" y="48" width="400" height="288" rx="12" class="monitor-bezel"/>
  <!-- Screen -->
  <rect x="80" y="72" width="352" height="240" class="screen"/>

  <!-- Pixel cloud on screen (5-pixel grid, centered) -->
  <!-- Cloud bottom row -->
  <rect x="144" y="232" width="224" height="32" class="cloud"/>
  <!-- Cloud middle row -->
  <rect x="176" y="200" width="160" height="32" class="cloud"/>
  <!-- Cloud top bumps -->
  <rect x="208" y="168" width="32" height="32" class="cloud"/>
  <rect x="272" y="168" width="32" height="32" class="cloud"/>
  <!-- Cloud top connector -->
  <rect x="240" y="168" width="32" height="32" class="cloud"/>

  <!-- Power LED -->
  <rect x="232" y="320" width="48" height="8" rx="4" class="led"/>

  <!-- Stand neck -->
  <rect x="216" y="344" width="80" height="48" class="stand-neck"/>
  <!-- Stand base -->
  <rect x="168" y="392" width="176" height="32" rx="4" class="stand-base"/>
  <!-- Base highlight -->
  <rect x="168" y="392" width="176" height="8" rx="4" class="stand-neck"/>
</svg>
